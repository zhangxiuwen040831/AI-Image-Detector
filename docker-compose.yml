version: "3.9"

services:
  aigc-detector-api:
    build: .
    container_name: aigc-detector-api
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
    # 如需使用 GPU，请在支持的环境中取消注释以下配置并根据实际情况调整：
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: ["gpu"]

