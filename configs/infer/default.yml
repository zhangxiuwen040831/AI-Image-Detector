infer:
  model_path: checkpoints/best.pth
  device: cuda
  image_size: 224
  mode: base_only
  threshold_profile: balanced
  thresholds:
    recall-first: 0.2
    balanced: 0.35
    precision-first: 0.35
    recall: 0.2
    precision: 0.35
    f1: 0.35
  backbone_name: vit_base_patch16_clip_224.openai
  use_aux_heads: true
  fused_dim: 512
  head_hidden_dim: 256
  dropout: 0.3
  scales:
  - 224
  tta_flip: false
  enable_debug: false
