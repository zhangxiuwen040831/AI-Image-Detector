project_name: "aigc_detector"
experiment_name: "gpu_training"

system:
  device: "cuda"
  num_workers: 8
  pin_memory: true
  seed: 42

data:
  train_dir: "./data/train"
  val_dir: "./data/val"
  image_size: 224
  batch_size: 32

model:
  backbone: "convnext_tiny"
  rgb_pretrained: true
  noise_pretrained: false
  freq_pretrained: false
  fused_dim: 768
  classifier_hidden_dim: 256
  dropout: 0.3

training:
  epochs: 30
  lr: 0.0001
  weight_decay: 0.0001
  use_amp: true

logging:
  use_tensorboard: true
  log_dir: "./logs/gpu_train"
  save_dir: "./checkpoints/gpu_train"
