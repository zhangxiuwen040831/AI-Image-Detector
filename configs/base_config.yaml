project_name: "aigc_detector"
experiment_name: "multibranch_default"

system:
  device: "cpu"
  num_workers: 0
  pin_memory: false
  seed: 42

data:
  train_dir: "./data/train"
  val_dir: "./data/val"
  image_size: 224
  batch_size: 8

model:
  backbone: "resnet18"
  rgb_pretrained: true
  noise_pretrained: false
  freq_pretrained: false
  fused_dim: 512
  classifier_hidden_dim: 256
  dropout: 0.3

training:
  epochs: 10
  lr: 0.0001
  weight_decay: 0.0001
  use_amp: false

logging:
  use_tensorboard: true
  log_dir: "./logs/default"
  save_dir: "./checkpoints/default"
