name: v9_competition
description: Candidate comparison config for base_only vs hybrid after V9 Phase 1.

candidates:
  base_only:
    inference_mode: base_only
    focus: low_false_positive
  hybrid:
    inference_mode: hybrid
    focus: f1_and_recall_if_precision_is_not_hurt

thresholds:
  default: 0.20
  start: 0.10
  end: 0.60
  step: 0.05

selection:
  industrial:
    prefer: [photos_fp, photos_precision, photos_recall, photos_f1]
  competition:
    prefer: [photos_best_f1]
    hybrid_precision_tolerance: 0.03
