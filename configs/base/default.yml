# Base configuration

system:
  seed: 42
  device: cuda
  num_workers: 4
  pin_memory: true

logging:
  log_dir: logs

model:
  backbone: resnet18
  rgb_pretrained: true
  noise_pretrained: false
  freq_pretrained: false
  fused_dim: 512
  classifier_hidden_dim: 256
  dropout: 0.3

loader:
  batch_size: 32

