data:
  local_dataset_root: "C:/Users/32902/Desktop/ai-image-detector/data"
  server_dataset_root: "/root/lanyun-tmp/ai-image-detector/data"
  runtime_dataset_root: ""
  dataset_index_name: "dataset_index.json"
  image_size: 224
  rebuild_index: false
  index_workers: 16

loader:
  batch_size: 128
  num_workers: 8
  pin_memory: true
  prefetch_factor: 4
  persistent_workers: true

train:
  seed: 42
  device: "cuda"
  epochs: 10
  lr: 0.0001
  weight_decay: 0.0001
  artifact_cifake_ratio: [3, 1]
  samples_per_epoch: 40000
  label_smoothing: 0.1
  grad_clip: 1.0
  save_dir: "./checkpoints/pipeline"

model:
  backbone: "resnet18"
  rgb_pretrained: true
  noise_pretrained: false
  freq_pretrained: false
  fused_dim: 512
  classifier_hidden_dim: 256
  dropout: 0.3
