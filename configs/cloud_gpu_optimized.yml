experiment_name: cloud_gpu_optimized

seed: 42

device: cuda
num_workers: 4

data:
  train_root: data/mix_data/train
  val_root: data/mix_data/test
  image_size: 224
  batch_size: 32

model:
  train_backbone: false
  use_lora: true
  lora_rank: 8
  lora_alpha: 16.0
  lora_dropout: 0.1
  use_osd: false

train:
  num_epochs: 5
  lr: 1e-4
  weight_decay: 0.01
  scheduler: cosine

log:
  log_dir: logs/cloud_gpu_optimized
  save_dir: checkpoints/demo
