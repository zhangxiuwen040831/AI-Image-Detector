# Training configuration

train:
  epochs: 50
  lr: 0.0001
  weight_decay: 0.0001
  bce_weight: 0.7
  focal_weight: 0.3
  focal_alpha: 0.25
  focal_gamma: 2.0
  lambda_rgb: 0.2
  lambda_freq: 0.2
  lambda_spatial: 0.2
  label_smoothing: 0.1
  grad_clip: 1.0
  use_ema: true
  ema_decay: 0.999
  temperature_init: 1.0
  save_dir: checkpoints

