experiment_name: cloud_gpu_fast

seed: 42

device: cuda
num_workers: 2

data:
  train_root: data/genimage/train
  val_root: data/genimage/val
  image_size: 224
  batch_size: 16

model:
  train_backbone: false
  use_lora: true
  lora_rank: 4
  lora_alpha: 8.0
  lora_dropout: 0.0
  use_osd: false

train:
  num_epochs: 2
  lr: 1e-4
  weight_decay: 0.01
  scheduler: cosine

log:
  log_dir: logs/cloud_gpu_fast
  save_dir: checkpoints/demo
